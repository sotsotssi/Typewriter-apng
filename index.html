<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타자 효과 텍스트 APNG 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- APNG 인코딩을 위한 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.min.js"></script>
    <!-- GIF 인코딩 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <header class="w-full max-w-6xl mb-6 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-bold text-white mb-2">타자 효과 텍스트 APNG 생성기 <a href="https://x.com/bb_uu_t" target="_blank" class="text-sm text-blue-400 hover:text-blue-300">@bb_uu_t</a></h1>
            <p class="text-sm text-gray-400">타이핑 효과 이미지 및 오디오 생성기</p>
        </div>
        <div class="flex gap-2 text-sm">
            <button id="btn-save-local" class="btn btn-secondary">로컬 저장</button>
            <button id="btn-load-local" class="btn btn-secondary">로컬 불러오기</button>
            <button id="btn-reset" class="btn btn-danger">초기화</button>
        </div>
    </header>

    <main class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 설정 패널 (좌측) -->
        <div class="lg:col-span-5 space-y-4 max-h-[80vh] overflow-y-auto pr-2 pb-4">
            
            <!-- 텍스트 입력 -->
            <div class="panel">
                <label class="label">텍스트 입력</label>
                <textarea id="val-text" class="input-base h-24 resize-none" placeholder="여기에 텍스트를 입력하세요.">유이타,
파이팅!</textarea>
            </div>

            <!-- 폰트 설정 -->
            <div class="panel grid grid-cols-2 gap-4">
                <div class="col-span-2 flex gap-2">
                    <div class="flex-1">
                        <label class="label">글꼴 선택</label>
                        <select id="val-fontFamilySelect" class="input-base">
                            <option value="Noto Sans KR" selected>Noto Sans KR (고딕)</option>
                            <option value="Noto Serif KR">Noto Serif KR (명조)</option>
                            <option value="Nanum Gothic">Nanum Gothic (나눔고딕)</option>
                            <option value="Nanum Myeongjo">Nanum Myeongjo (나눔명조)</option>
                            <option value="Jua">Jua (주아)</option>
                            <option value="Do Hyeon">Do Hyeon (도현)</option>
                            <option value="Black Han Sans">Black Han Sans (블랙한산스)</option>
                            <option value="custom">직접 입력 (로컬 폰트명)</option>
                        </select>
                    </div>
                    <div class="flex-1" id="custom-font-container" style="display: none;">
                        <label class="label">직접 입력</label>
                        <input type="text" id="val-fontFamilyCustom" class="input-base" placeholder="폰트 이름 입력" value="">
                    </div>
                </div>
                <div>
                    <label class="label">글꼴 크기 (px)</label>
                    <input type="number" id="val-fontSize" class="input-base" value="48">
                </div>
                <div>
                    <label class="label">장평 (%)</label>
                    <input type="number" id="val-scaleX" class="input-base" value="100">
                </div>
                <div>
                    <label class="label">자간 (px)</label>
                    <input type="number" id="val-letterSpacing" class="input-base" value="0">
                </div>
                <div>
                    <label class="label">줄간격 배수</label>
                    <input type="number" step="0.1" id="val-lineHeight" class="input-base" value="1.2">
                </div>
                <div class="col-span-2 grid grid-cols-4 gap-2 bg-[#181825] p-3 rounded-lg border border-[#45475a] mt-2">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="val-isBold" class="w-4 h-4 accent-[#89b4fa] cursor-pointer rounded border-[#45475a] bg-[#1e1e2e]">
                        <label for="val-isBold" class="label mb-0 cursor-pointer">굵게</label>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="val-isItalic" class="w-4 h-4 accent-[#89b4fa] cursor-pointer rounded border-[#45475a] bg-[#1e1e2e]">
                        <label for="val-isItalic" class="label mb-0 cursor-pointer">기울임</label>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="val-isUnderline" class="w-4 h-4 accent-[#89b4fa] cursor-pointer rounded border-[#45475a] bg-[#1e1e2e]">
                        <label for="val-isUnderline" class="label mb-0 cursor-pointer">밑줄</label>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="val-isStrikethrough" class="w-4 h-4 accent-[#89b4fa] cursor-pointer rounded border-[#45475a] bg-[#1e1e2e]">
                        <label for="val-isStrikethrough" class="label mb-0 cursor-pointer">취소선</label>
                    </div>
                </div>
            </div>

            <!-- 레이아웃 설정 -->
            <div class="panel grid grid-cols-2 gap-4">
                <div>
                    <label class="label">쓰기 방향</label>
                    <select id="val-writingMode" class="input-base">
                        <option value="horizontal">가로 쓰기</option>
                        <option value="vertical">세로 쓰기</option>
                    </select>
                </div>
                <div>
                    <label class="label">가로 정렬</label>
                    <select id="val-textAlign" class="input-base">
                        <option value="left">왼쪽 정렬</option>
                        <option value="center" selected>가운데 정렬</option>
                        <option value="right">오른쪽 정렬</option>
                    </select>
                </div>
                <div>
                    <label class="label">세로 정렬</label>
                    <select id="val-verticalAlign" class="input-base">
                        <option value="top">위 정렬</option>
                        <option value="center" selected>가운데 정렬</option>
                        <option value="bottom">아래 정렬</option>
                    </select>
                </div>
                <div>
                    <label class="label">등장 방향</label>
                    <select id="val-direction" class="input-base">
                        <option value="forward" selected>정방향 (앞에서부터)</option>
                        <option value="backward">역방향 (뒤에서부터)</option>
                    </select>
                </div>
            </div>

            <!-- 도형 쓰기 설정 -->
            <div class="panel grid grid-cols-2 gap-4">
                <div>
                    <label class="label">도형 모드</label>
                    <select id="val-shapeMode" class="input-base">
                        <option value="none" selected>사용 안 함 (기본)</option>
                        <option value="circle">원</option>
                        <option value="square">사각형</option>
                        <option value="triangle">삼각형</option>
                    </select>
                </div>
                <div>
                    <label class="label">도형 크기 (반지름/기준 크기 px)</label>
                    <input type="number" id="val-shapeSize" class="input-base" value="100">
                </div>
                <div class="col-span-2">
                    <label class="label">프레임당 회전 속도 (도/프레임)</label>
                    <input type="number" step="0.5" id="val-shapeRotateSpeed" class="input-base" value="0">
                    <p class="text-xs text-gray-400 mt-1">양수는 시계방향, 음수는 반시계방향으로 전체 도형이 회전합니다. (도형 모드 시에만 적용)</p>
                </div>
            </div>

            <!-- 스타일 설정 -->
            <div class="panel grid grid-cols-2 gap-4">
                <div class="col-span-2 flex flex-col gap-2 bg-[#181825] p-3 rounded-lg border border-[#45475a]">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="val-useBackgroundColor" class="w-5 h-5 accent-[#89b4fa] cursor-pointer rounded border-[#45475a] bg-[#1e1e2e]">
                        <label for="val-useBackgroundColor" class="label mb-0 cursor-pointer">배경색 사용 (GIF 내보내기 최적화 등)</label>
                    </div>
                    <div class="flex items-center gap-2 w-full">
                        <label class="label w-24 mb-0">배경 색상</label>
                        <input type="color" id="val-backgroundColor" class="input-base h-10 p-1 flex-1" value="#000000">
                    </div>
                </div>
                <div>
                    <label class="label">채우기 색상</label>
                    <input type="color" id="val-fillColor" class="input-base h-10 p-1" value="#ffffff">
                </div>
                <div>
                    <label class="label">테두리 색상</label>
                    <input type="color" id="val-strokeColor" class="input-base h-10 p-1" value="#000000">
                </div>
                <div class="col-span-2">
                    <label class="label">테두리 두께 (px)</label>
                    <input type="number" id="val-strokeWidth" class="input-base" value="4">
                </div>
                <div>
                    <label class="label">그림자 색상</label>
                    <input type="color" id="val-shadowColor" class="input-base h-10 p-1" value="#000000">
                </div>
                <div>
                    <label class="label">그림자 퍼짐 (px)</label>
                    <input type="number" id="val-shadowBlur" class="input-base" value="4">
                </div>
                <div>
                    <label class="label">그림자 X 오프셋</label>
                    <input type="number" id="val-shadowOffsetX" class="input-base" value="2">
                </div>
                <div>
                    <label class="label">그림자 Y 오프셋</label>
                    <input type="number" id="val-shadowOffsetY" class="input-base" value="2">
                </div>
            </div>

            <!-- 애니메이션 및 내보내기 설정 -->
            <div class="panel grid grid-cols-2 gap-4">
                <div>
                    <label class="label">초당 프레임 수 (FPS)</label>
                    <input type="number" id="val-fps" class="input-base" value="12">
                    <p class="text-xs text-gray-400 mt-1">타이핑 속도를 결정합니다.</p>
                </div>
                <div>
                    <label class="label">완성 후 대기 (ms)</label>
                    <input type="number" id="val-holdLast" class="input-base" value="2000">
                    <p class="text-xs text-gray-400 mt-1">텍스트 연출 완료 후 머무르는 시간입니다.</p>
                </div>
                <div class="col-span-2 grid grid-cols-2 gap-4 bg-[#181825] p-3 rounded-lg border border-[#45475a]">
                    <div>
                        <label class="label">페이드아웃 모드</label>
                        <select id="val-fadeMode" class="input-base">
                            <option value="none" selected>사용 안 함</option>
                            <option value="global">전체 동시 페이드아웃</option>
                            <option value="individual">개별 글자 순차 페이드아웃</option>
                        </select>
                    </div>
                    <div>
                        <label class="label">페이드아웃 시간 (ms)</label>
                        <input type="number" id="val-fadeOutDuration" class="input-base" value="1000">
                    </div>
                </div>
                <div>
                    <label class="label">캔버스 너비 (px)</label>
                    <input type="number" id="val-canvasWidth" class="input-base" value="600">
                </div>
                <div>
                    <label class="label">캔버스 높이 (px)</label>
                    <input type="number" id="val-canvasHeight" class="input-base" value="300">
                </div>
                <div class="col-span-2">
                    <button id="btn-auto-size" class="btn btn-secondary w-full text-sm">텍스트 여백 자르기</button>
                </div>
            </div>

            <!-- 오디오 (효과음) 설정 패널 -->
            <div class="panel space-y-4">
                <div>
                    <h3 class="text-lg font-bold text-white">오디오 효과음 생성 (옵션)</h3>
                    <p class="text-xs text-gray-400 mt-1 mb-3">타이핑에 맞춰 재생될 효과음 파일(mp3, wav 등)을 업로드하세요.</p>
                    <input type="file" id="input-audio" accept="audio/*" class="input-base mb-3">
                    
                    <label class="label">효과음 재생 방식</label>
                    <select id="val-audioMode" class="input-base">
                        <option value="overlap" selected>프레임 재생 (겹침 허용)</option>
                        <option value="smart">맞춤형 (겹침 방지 및 종료 시 페이드아웃)</option>
                    </select>
                </div>
                
                <div class="flex gap-2">
                    <button id="btn-generate-audio" class="btn btn-secondary flex-1" disabled>효과음 생성 및 미리듣기</button>
                    <button id="btn-download-audio" class="btn btn-primary flex-1 hidden">WAV 다운로드</button>
                </div>

                <audio id="audio-preview" controls class="w-full mt-2 hidden" style="border-radius: 8px;"></audio>
            </div>

            <!-- JSON 데이터 설정 -->
            <div class="panel flex gap-2">
                <button id="btn-export-json" class="btn btn-secondary flex-1">JSON 내보내기</button>
                <label for="input-import-json" class="btn btn-secondary flex-1 m-0 text-center cursor-pointer">
                    JSON 불러오기
                    <input type="file" id="input-import-json" accept=".json" class="hidden">
                </label>
            </div>

        </div>

        <!-- 프리뷰 및 결과 패널 (우측) -->
        <div class="lg:col-span-7 flex flex-col space-y-4">
            <div class="panel flex-1 flex flex-col">
                <h2 class="text-xl font-bold mb-4 flex justify-between items-center">
                    <span>미리보기</span>
                    <span id="preview-status" class="text-sm font-normal text-gray-400">프레임: 0 / 0</span>
                </h2>
                
                <div class="flex-1 flex items-center justify-center bg-[#181825] rounded-lg overflow-hidden border border-[#45475a] p-4">
                    <canvas id="preview-canvas" class="max-w-full max-h-full object-contain" width="600" height="300"></canvas>
                </div>

                <div class="mt-4 flex justify-end gap-2">
                    <button id="btn-pause-preview" class="btn btn-secondary">일시정지</button>
                    <button id="btn-resume-preview" class="btn btn-secondary">재생</button>
                    <button id="btn-play-preview" class="btn btn-secondary">다시 재생</button>
                    <button id="btn-export-gif" class="btn btn-primary bg-emerald-500 hover:bg-emerald-400 text-gray-900">GIF 다운로드</button>
                    <button id="btn-export-apng" class="btn btn-primary px-8">APNG 다운로드</button>
                </div>
                
                <div id="export-overlay" class="hidden mt-4 bg-[#89b4fa] text-[#11111b] p-3 rounded-lg text-center font-bold animate-pulse">
                    렌더링 중입니다... 잠시만 기다려주세요.
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
